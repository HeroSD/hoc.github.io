<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Đông Y 2-trong-1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="menu">
        <h2>Chọn chế độ học</h2>
        <button onclick="startGame('quiz')">Trắc nghiệm</button>
        <button onclick="startGame('fill')">Điền vào chỗ trống</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="timer" style="font-weight: bold; color: #e74c3c;">Thời gian: 10s</div>
        <img id="herb-image" src="" alt="Thuốc">
        
        <div id="quiz-options" class="hidden"></div>
        <div id="fill-options" class="hidden">
            <input type="text" id="answer-input" placeholder="Nhập tên thuốc...">
            <button onclick="checkInput()">Kiểm tra</button>
        </div>
        
        <div id="feedback" class="hidden"></div>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
